name: Upload Weather Underground

on:
  schedule:
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests tinytuya gspread google-auth
      - name: Criar credenciais Google
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > gcreds.json
      - name: Rodar script
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python upload.py
